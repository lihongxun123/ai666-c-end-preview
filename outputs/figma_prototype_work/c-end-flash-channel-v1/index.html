<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>多元拾光 C端闪念频道多状态原型 V1</title>
  <link rel="icon" type="image/svg+xml" href="../_assets/brand/duoyuan-shiguang-favicon.svg" />
  <style>
    :root {
      --bg: #f6f8fb;
      --panel: #ffffff;
      --panel-soft: #f9fbff;
      --line: #e6edf5;
      --line-strong: #d9e2ee;
      --text: #151b26;
      --muted: #667085;
      --weak: #98a2b3;
      --brand: #16b8a6;
      --brand-deep: #0f9384;
      --brand-soft: rgba(22, 184, 166, 0.10);
      --blue: #2563eb;
      --blue-soft: rgba(37, 99, 235, 0.10);
      --purple: #7c3aed;
      --purple-soft: rgba(124, 58, 237, 0.10);
      --orange: #f97316;
      --orange-soft: rgba(249, 115, 22, 0.12);
      --green: #22c55e;
      --green-soft: rgba(34, 197, 94, 0.12);
      --red: #ef4444;
      --red-soft: rgba(239, 68, 68, 0.10);
      --shadow: 0 22px 60px rgba(22, 32, 54, 0.10);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 1920px;
      min-height: 1080px;
      margin: 0;
      overflow-x: hidden;
      overflow-y: auto;
      background:
        radial-gradient(circle at 22% -10%, rgba(22, 184, 166, 0.09), transparent 30%),
        radial-gradient(circle at 78% 8%, rgba(37, 99, 235, 0.06), transparent 32%),
        linear-gradient(90deg, rgba(37, 99, 235, 0.018) 1px, transparent 1px) 0 0 / 32px 32px,
        linear-gradient(0deg, rgba(22, 184, 166, 0.018) 1px, transparent 1px) 0 0 / 32px 32px,
        var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: default;
      appearance: none;
    }

    .page {
      width: 1920px;
      min-height: 1080px;
      position: relative;
    }

    .topbar {
      height: 72px;
      background: rgba(255, 255, 255, 0.92);
      border-bottom: 1px solid rgba(219, 227, 239, 0.92);
      backdrop-filter: blur(16px);
    }

    .nav-shell {
      width: 1440px;
      height: 72px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 30px;
    }

    .brand {
      width: 184px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .brand-mark {
      width: 32px;
      height: 32px;
      border-radius: 9px;
      background: linear-gradient(135deg, #2563eb, #16b8a6);
      box-shadow: 0 10px 22px rgba(22, 184, 166, 0.20);
    }

    .brand-name {
      font-size: 28px;
      line-height: 34px;
      font-weight: 820;
      color: #111827;
    }

    .brand-sub {
      margin-left: 2px;
      color: var(--muted);
      font-size: 13px;
      line-height: 18px;
      font-weight: 650;
      white-space: nowrap;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 26px;
      height: 72px;
      flex-shrink: 0;
    }

    .nav-item {
      height: 72px;
      display: flex;
      align-items: center;
      color: #273244;
      font-size: 16px;
      line-height: 22px;
      font-weight: 740;
      position: relative;
      white-space: nowrap;
    }

    .nav-item.active {
      color: var(--brand-deep);
    }

    .nav-item.active::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 3px;
      border-radius: 3px 3px 0 0;
      background: linear-gradient(90deg, var(--brand), var(--blue));
    }

    .top-search {
      margin-left: auto;
      width: 460px;
      height: 42px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      box-shadow: 0 8px 24px rgba(22, 32, 54, 0.04);
    }

    .top-search img {
      width: 18px;
      height: 18px;
      opacity: 0.62;
      flex-shrink: 0;
    }

    .top-search input {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      font-size: 14px;
      line-height: 20px;
      color: var(--text);
    }

    .top-actions {
      width: 260px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 14px;
      flex-shrink: 0;
    }

    .creator-button {
      height: 40px;
      padding: 0 18px;
      border-radius: 8px;
      background: linear-gradient(135deg, #2563eb, #16b8a6);
      color: #fff;
      font-size: 14px;
      line-height: 20px;
      font-weight: 760;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 12px 24px rgba(37, 99, 235, 0.18);
    }

    .creator-button img,
    .icon-button img,
    .action img,
    .tool img,
    .small-link img {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .icon-button {
      width: 40px;
      height: 40px;
      border-radius: 20px;
      border: 1px solid var(--line);
      background: #fff;
      display: grid;
      place-items: center;
    }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid rgba(255, 255, 255, 0.9);
      box-shadow: 0 8px 18px rgba(17, 24, 39, 0.12);
      flex-shrink: 0;
    }

    .layout {
      width: 1240px;
      min-height: 972px;
      margin: 24px auto 0;
      display: grid;
      grid-template-columns: 820px 340px;
      gap: 24px;
      align-items: start;
    }

    .main-panel,
    .right-rail {
      min-width: 0;
    }

    .channel-head {
      height: 96px;
      padding: 20px 24px;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: var(--shadow);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .eyebrow {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--brand-deep);
      font-size: 13px;
      line-height: 18px;
      font-weight: 760;
    }

    .eyebrow img {
      width: 18px;
      height: 18px;
    }

    h1 {
      margin: 6px 0 0;
      font-size: 28px;
      line-height: 34px;
      color: #111827;
      font-weight: 840;
    }

    .head-desc {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
      line-height: 20px;
    }

    .signal-card {
      width: 194px;
      padding: 14px;
      border-radius: 10px;
      background: linear-gradient(135deg, rgba(22, 184, 166, 0.12), rgba(37, 99, 235, 0.08));
      border: 1px solid rgba(22, 184, 166, 0.18);
    }

    .signal-card strong {
      display: block;
      font-size: 20px;
      line-height: 24px;
      color: var(--brand-deep);
    }

    .signal-card span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 16px;
    }

    .composer,
    .feed-card,
    .state-card,
    .rail-card {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 16px 36px rgba(22, 32, 54, 0.07);
    }

    .timeline-copy {
      display: grid;
      gap: 3px;
    }

    .timeline-copy strong {
      font-size: 16px;
      line-height: 22px;
      color: #111827;
    }

    .timeline-copy span {
      color: var(--muted);
      font-size: 13px;
      line-height: 18px;
    }

    .tabs {
      display: flex;
      align-items: center;
      gap: 28px;
    }

    .tab {
      height: 64px;
      display: flex;
      align-items: center;
      position: relative;
      color: var(--muted);
      font-size: 15px;
      line-height: 20px;
      font-weight: 760;
      background: transparent;
      padding: 0;
    }

    .tab.active {
      color: var(--brand-deep);
    }

    .tab.active::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 3px;
      border-radius: 3px 3px 0 0;
      background: var(--brand);
    }

    .composer {
      margin-top: 16px;
      border-radius: 12px;
      padding: 16px 18px;
    }

    .composer-top {
      display: grid;
      grid-template-columns: 42px 1fr 104px;
      gap: 12px;
      align-items: start;
    }

    .composer-field {
      min-height: 42px;
      border-radius: 10px;
      border: 1px solid var(--line-strong);
      background: var(--panel-soft);
      color: var(--weak);
      font-size: 14px;
      line-height: 20px;
      display: flex;
      align-items: center;
      padding: 0 14px;
    }

    .composer.expanded .composer-field {
      min-height: 116px;
      align-items: flex-start;
      padding-top: 12px;
      color: #273244;
    }

    .send-button {
      height: 40px;
      border-radius: 8px;
      background: #111827;
      color: #fff;
      font-size: 14px;
      line-height: 20px;
      font-weight: 760;
    }

    .composer-tools {
      margin: 12px 0 0 54px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tool {
      height: 30px;
      padding: 0 10px;
      border-radius: 15px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      line-height: 16px;
      font-weight: 650;
    }

    .tool.primary {
      background: var(--brand-soft);
      color: var(--brand-deep);
      border-color: rgba(22, 184, 166, 0.18);
    }

    .feed-list {
      margin-top: 0;
      display: grid;
      gap: 12px;
    }

    .feed-card {
      border-radius: 12px;
      padding: 18px 20px;
      position: relative;
      overflow: hidden;
    }

    .feed-card.highlight::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: #242424;
    }

    .author-line {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .author-meta {
      min-width: 0;
    }

    .name-line {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      line-height: 20px;
      color: #242424;
      font-weight: 760;
    }

    .badge {
      height: 20px;
      padding: 0 7px;
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      font-size: 11px;
      line-height: 16px;
      font-weight: 760;
    }

    .badge.official {
      color: #242424;
      background: linear-gradient(90deg, rgba(36, 36, 36, 0.10), rgba(36, 36, 36, 0.02));
    }

    .badge.featured {
      color: #242424;
      background: linear-gradient(90deg, rgba(36, 36, 36, 0.10), rgba(36, 36, 36, 0.02));
    }

    .time-line {
      margin-top: 2px;
      color: var(--weak);
      font-size: 12px;
      line-height: 16px;
    }

    .body-text {
      margin: 12px 0 0 52px;
      color: #4f4f4f;
      font-size: 15px;
      line-height: 24px;
    }

    .body-text strong {
      color: #242424;
    }

    .topic-row {
      margin: 12px 0 0 52px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .topic-tag {
      height: 24px;
      padding: 0 8px;
      border-radius: 6px;
      background: var(--panel-soft);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      line-height: 18px;
      display: inline-flex;
      align-items: center;
    }

    .code-block {
      margin: 14px 0 0 52px;
      border-radius: 10px;
      background: #242424;
      overflow: hidden;
      border: 1px solid #242424;
    }

    .code-head {
      height: 34px;
      padding: 0 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #bdbdbd;
      font-size: 12px;
      line-height: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    pre {
      margin: 0;
      padding: 12px;
      color: #eeeeee;
      font-size: 12px;
      line-height: 18px;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      white-space: pre-wrap;
    }

    .media-grid {
      margin: 14px 0 0 52px;
      display: grid;
      grid-template-columns: repeat(3, 112px);
      gap: 8px;
    }

    .media-thumb {
      width: 112px;
      height: 78px;
      border-radius: 8px;
      object-fit: cover;
      border: 1px solid var(--line);
      background: var(--panel-soft);
    }

    .video-thumb {
      margin: 14px 0 0 52px;
      width: 268px;
      height: 150px;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
      border: 1px solid var(--line);
      background: #242424;
    }

    .video-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.88;
    }

    .play-mark {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.92);
      display: grid;
      place-items: center;
    }

    .play-mark img {
      width: 20px;
      height: 20px;
    }

    .video-meta {
      position: absolute;
      left: 10px;
      bottom: 10px;
      height: 24px;
      padding: 0 9px;
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      background: rgba(17, 24, 39, 0.72);
      color: #ffffff;
      font-size: 12px;
      line-height: 16px;
      font-weight: 760;
    }

    .actions {
      margin: 14px 0 0 52px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .action {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
      line-height: 18px;
      background: transparent;
      padding: 3px 0;
    }

    .action img {
      width: 16px;
      height: 16px;
      opacity: 0.78;
    }

    .action.liked {
      color: #242424;
      border: 1px solid #e2e2e2;
      border-radius: 999px;
      background: #f6f6f6;
      padding: 3px 9px;
      font-weight: 760;
      position: relative;
    }

    .action.liked::after {
      content: none;
    }

    .state-card {
      min-height: 520px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      padding: 40px;
      color: var(--muted);
      text-align: center;
    }

    .state-card h2 {
      margin: 14px 0 8px;
      color: #111827;
      font-size: 22px;
      line-height: 28px;
    }

    .state-card p {
      margin: 0;
      font-size: 14px;
      line-height: 22px;
      max-width: 420px;
    }

    .empty-actions {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .ghost-button,
    .solid-button {
      height: 36px;
      padding: 0 14px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 18px;
      font-weight: 760;
    }

    .solid-button {
      color: #fff;
      background: var(--brand-deep);
    }

    .ghost-button {
      color: var(--brand-deep);
      background: var(--brand-soft);
    }

    .skeleton-list {
      width: 100%;
      display: grid;
      gap: 14px;
    }

    .skeleton {
      height: 126px;
      border-radius: 12px;
      background: linear-gradient(90deg, #eef3f8, #f8fafc, #eef3f8);
      background-size: 240% 100%;
    }

    .comments-panel {
      margin-top: 16px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--line);
      box-shadow: 0 16px 36px rgba(22, 32, 54, 0.08);
      padding: 18px;
    }

    .feed-card .comments-panel {
      box-shadow: none;
      background: var(--panel-soft);
      margin-top: 14px;
      padding: 14px;
    }

    .comments-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }

    .comments-head strong {
      font-size: 15px;
      line-height: 20px;
    }

    .comment-item {
      display: block;
      padding: 14px 0;
      border-bottom: 1px solid var(--line);
    }

    .comment-item:last-child {
      border-bottom: 0;
    }

    .comment-item .avatar {
      width: 34px;
      height: 34px;
    }

    .comment-author-card {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .comment-author-main {
      min-width: 0;
    }

    .comment-name,
    .comment-author-name {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      line-height: 18px;
      font-weight: 760;
    }

    .comment-author-name span:first-child {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .comment-author-meta {
      margin-top: 2px;
      color: var(--weak);
      font-size: 12px;
      line-height: 16px;
    }

    .comment-text {
      margin: 8px 0 0 44px;
      color: #4f4f4f;
      font-size: 13px;
      line-height: 20px;
    }

    .comment-actions {
      margin: 9px 0 0 44px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .comment-action {
      height: 28px;
      padding: 0 9px;
      border: 1px solid transparent;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: transparent;
      color: var(--weak);
      font-size: 12px;
      line-height: 16px;
      font-weight: 700;
    }

    .comment-action img {
      width: 14px;
      height: 14px;
      opacity: 0.78;
    }

    .comment-action.is-liked {
      border-color: #e2e2e2;
      background: #f6f6f6;
      color: #242424;
    }

    .comment-replies {
      margin: 10px 0 0 44px;
      padding: 10px 12px;
      display: grid;
      gap: 10px;
      border-radius: 8px;
      background: rgba(248, 250, 252, 0.92);
      border: 1px solid rgba(226, 232, 240, 0.86);
    }

    .comment-reply {
      min-width: 0;
      display: grid;
      gap: 6px;
    }

    .reply-line {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 6px;
      color: #4f4f4f;
      font-size: 12px;
      line-height: 16px;
    }

    .reply-author {
      color: #242424;
      font-weight: 760;
    }

    .reply-target {
      color: var(--weak);
      font-weight: 680;
    }

    .reply-text {
      margin: 0;
      color: #4f4f4f;
      font-size: 13px;
      line-height: 20px;
    }

    .reply-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .comment-input {
      margin-top: 12px;
      height: 40px;
      border-radius: 8px;
      border: 1px solid var(--line-strong);
      background: var(--panel-soft);
      color: var(--weak);
      display: flex;
      align-items: center;
      padding: 0 12px;
      font-size: 13px;
      line-height: 18px;
    }

    .comment-more {
      width: 100%;
      margin-top: 4px;
      height: 38px;
      border-radius: 8px;
      background: rgba(22, 184, 166, 0.08);
      color: var(--brand-deep);
      font-size: 13px;
      line-height: 18px;
      font-weight: 780;
    }

    .modal-layer {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      background: rgba(15, 23, 42, 0.32);
      backdrop-filter: blur(6px);
    }

    .modal-card {
      border-radius: 12px;
      border: 1px solid rgba(226, 232, 240, 0.94);
      background: rgba(255, 255, 255, 0.98);
      box-shadow: 0 28px 80px rgba(15, 23, 42, 0.22);
      overflow: hidden;
    }

    .compose-modal {
      width: 620px;
    }

    .all-comments-modal {
      width: 640px;
      max-height: 760px;
      display: flex;
      flex-direction: column;
    }

    .modal-head {
      height: 58px;
      padding: 0 20px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-head strong {
      font-size: 17px;
      line-height: 24px;
      color: #111827;
    }

    .modal-close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--panel-soft);
      color: var(--muted);

    function renderComposer() {
      const composerRoot = document.getElementById("composer-root");
      if (composerRoot) composerRoot.innerHTML = "";
    }

    function actionIcon(type, fill = false) {
      const map = {
        comment: "Communication/chat-3-line.svg",
        like: fill ? "Health & Medical/heart-3-fill.svg" : "Health & Medical/heart-3-line.svg",
        share: "System/share-forward-line.svg"
      };
      return icon(map[type]);
    }

    function renderCommentItem(comment, index, all = false) {
      const liked = index === 0 || comment.likes >= 5;
      const replies = comment.replies?.length ? `
        <div class="comment-replies" data-comment-replies>
          ${comment.replies.map((reply) => `
            <div class="comment-reply" data-comment-reply-item data-reply-to-comment="${reply.replyTo || comment.name}">
              <div class="reply-line">
                <span class="reply-author">${reply.name}</span>
                <span class="reply-target">回复 @${reply.replyTo || comment.name}</span>
                <span>${reply.time}</span>
              </div>
              <p class="reply-text">${reply.text}</p>
              <div class="reply-actions">
                <button class="comment-action comment-like ${reply.likes >= 2 ? "is-liked" : ""}" data-comment-like>
                  <img data-icon src="${actionIcon("like", reply.likes >= 2)}" alt="" />赞 ${reply.likes}
                </button>
                <button class="comment-action" data-comment-reply>回复</button>
              </div>
            </div>
          `).join("")}
        </div>
      ` : "";
      return `
        <div class="comment-item" ${all ? "data-all-comment-item" : "data-comment-item"}>
          <div class="comment-author-card" data-comment-author-card>
            <img class="avatar" src="${comment.avatar}" alt="" />
            <div class="comment-author-main">
              <div class="comment-author-name">
                <span>${comment.name}</span>
              </div>
              <div class="comment-author-meta">${comment.time}</div>
            </div>
          </div>
          <div class="comment-text">${comment.text}</div>
          <div class="comment-actions">
            <button class="comment-action comment-like ${liked ? "is-liked" : ""}" data-comment-like>
              <img data-icon src="${actionIcon("like", liked)}" alt="" />赞 ${comment.likes}
            </button>
            <button class="comment-action" data-comment-reply>回复</button>
          </div>
          ${replies}
        </div>
      `;
    }

    function renderInlineComments(item) {
      const visibleComments = commentItems.slice(0, 10);
      return `
        <section class="comments-panel" data-comments-panel data-inline-comments>
          <div class="comments-head">
            <strong>评论 ${item.comments}</strong>
          </div>
          <div class="comment-input">写下你的评论或回复...</div>
          ${visibleComments.map((comment, index) => renderCommentItem(comment, index)).join("")}
          <button class="comment-more" data-view-all-comments>查看全部评论</button>
        </section>
      `;
    }

    function renderCard(item, index, showComments = false) {
      const isHotState = state === "hot";
      const isFocused = isHotState && requestedFocusId && item.id === requestedFocusId;
      const media = item.images ? `
        <div class="media-grid" data-media>
          ${item.images.map((src) => `<img class="media-thumb" src="${src}" alt="" />`).join("")}
        </div>
      ` : item.video ? `
        <div class="video-thumb" data-video data-short-video>
          <img src="${item.video}" alt="" />
          <span class="play-mark"><img data-icon src="${icon("Media/play-mini-fill.svg")}" alt="" /></span>
          <span class="video-meta" data-short-video-limit>${item.mediaLabel || "短视频 · 50M 内"}</span>
        </div>
      ` : "";

      const code = item.code ? `
        <div class="code-block" data-code-snippet>
          <div class="code-head"><span>JavaScript</span><span>复制</span></div>
          <pre>${item.code}</pre>
        </div>
      ` : "";

      return `
        <article class="feed-card ${index === 0 ? "highlight" : ""} ${isFocused ? "hot-focus" : ""}" data-flash-card data-flash-id="${item.id}" ${isFocused ? `data-hot-focused="true"` : ""}>
          <div class="author-line">
            <img class="avatar" src="${item.avatar}" alt="" />
            <div class="author-meta">
              <div class="name-line">
                <span>${item.author}</span>
                ${item.badge ? `<span class="badge ${item.badge === "官方" ? "official" : "featured"}">${item.badge}</span>` : ""}
                ${isHotState ? `<span class="hot-score" data-hot-score>热度 ${item.hotScore || item.read}</span>` : ""}
              </div>
              <div class="time-line">${item.time}</div>
            </div>
          </div>
          <div class="body-text">${item.text}</div>
          ${code}
          ${media}
          <div class="topic-row">
            ${item.topics.map((topic) => `<span class="topic-tag"># ${topic}</span>`).join("")}
          </div>
          <div class="actions">
            <button class="action" data-comment-action aria-label="评论 ${item.comments}"><img data-icon src="${actionIcon("comment")}" alt="" />${item.comments}</button>
            <button class="action ${item.liked ? "liked" : ""}" aria-label="点赞 ${item.likes}"><img data-icon src="${actionIcon("like", item.liked)}" alt="" />${item.likes}</button>
            <button class="action" aria-label="分享"><img data-icon src="${actionIcon("share")}" alt="" /></button>
          </div>
          ${showComments ? renderInlineComments(item) : ""}
        </article>
      `;
    }

    function renderState() {
      const root = document.getElementById("content-root");
      const items = stateItems[state] || baseItems;
      const showInlineComments = (state === "comments" || state === "comments-all");
      const stateStrip = state === "hot" ? `
        <div class="state-strip" data-hot-state-strip>
          <strong data-flash-state-label>热门闪念</strong>
          <span>按近 7 天评论、点赞、回复、分享、收藏综合热度排序</span>
        </div>
      ` : "";
      root.innerHTML = `${stateStrip}<div class="feed-list" data-feed-list>${items.map((item, index) => renderCard(item, index, showInlineComments && index === 0)).join("")}</div>`;
    }

    function modalUrl(nextState) {
      const url = new URL(location.href);
      if (nextState) url.searchParams.set("state", nextState);
      else url.searchParams.delete("state");
      if (nextState !== "hot") url.searchParams.delete("focus");
      if (nextState !== "compose") url.searchParams.delete("topic");
      return url.href;
    }

    function hotUrl(focusId = "") {
      const url = new URL(location.href);
      url.searchParams.set("state", "hot");
      if (focusId) url.searchParams.set("focus", focusId);
      else url.searchParams.delete("focus");
      url.searchParams.delete("topic");
      return url.href;
    }

    function composeTopicUrl(topic) {
      const url = new URL(location.href);
      url.searchParams.set("state", "compose");
      url.searchParams.set("topic", topic);
      url.searchParams.delete("focus");
      return url.href;
    }

    function topicSquareUrl() {
      return "../c-end-topic-square-v1/index.html?state=default";
    }

    function renderModals() {
      const modalRoot = document.getElementById("modal-root");
      if (state === "compose") {
        modalRoot.innerHTML = `
          <div class="modal-layer" data-compose-modal>

                        <button type="button" class="md-tool" data-md-command="image" data-compose-image-upload title="Image" aria-label="Image"><img data-icon src="${icon("Media/image-add-line.svg")}" alt="" /></button>
                        <button type="button" class="md-tool" data-md-command="video" data-compose-video-upload title="Short video" aria-label="Short video"><img data-icon src="${icon("Media/video-upload-line.svg")}" alt="" /></button>
                        <input type="file" accept="image/*" multiple hidden data-compose-image-input />
                        <input type="file" accept="video/mp4,video/webm,video/quicktime" hidden data-compose-video-input data-video-max-size-mb="50" />
                      </div>
                    </div>
                    <span class="compose-counter" data-compose-counter>0 / 600</span>
                  </div>
                </div>
                <div class="topic-picker-panel" data-topic-picker-panel>
                  ${["Vibe Coding", "AI Coding 一周实践", "API 排错短记录", "MCP Server", "RAG 应用"].map((topic) => `
                    <button type="button" class="topic-option" data-topic-option data-topic="${topic}"># ${topic}</button>
                  `).join("")}
                </div>
                <div class="modal-actions">
                  <button class="ghost-button" data-close-modal>取消</button>
                  <button class="solid-button">发布</button>
                </div>
              </div>
            </section>
          </div>
        `;
        normalizeComposeToolbar();
        return;
      }

      if (state === "comments-all") {
        modalRoot.innerHTML = `
          <div class="modal-layer" data-all-comments-modal>
            <section class="modal-card all-comments-modal" role="dialog" aria-modal="true" aria-label="全部评论">
              <div class="modal-head">
                <strong>全部评论</strong>
                <button class="modal-close" data-close-modal aria-label="关闭">×</button>
              </div>
              <div class="all-comments-body">
                ${commentItems.map((comment, index) => renderCommentItem(comment, index, true)).join("")}
              </div>
              <div class="all-comments-composer" data-all-comments-composer>
                <textarea placeholder="写下你的评论或回复"></textarea>
                <button class="solid-button" data-all-comments-submit>发布</button>
              </div>
            </section>
          </div>
        `;
        return;
      }

      modalRoot.innerHTML = "";
    }

    function normalizeComposeToolbar() {
      const toolbar = document.querySelector("[data-md-toolbar]");
      const textarea = document.querySelector("[data-compose-markdown]");
      const toolsSlot = document.querySelector("[data-compose-editor-tools]");
      if (!toolbar || !textarea) return;
      const allowedTools = {
        heading: "Heading",
        bold: "Bold",
        italic: "Italic",
        quote: "Quote",
        list: "List",
        "ordered-list": "Ordered list",
        topic: "Topic",
        image: "Image",
        video: "Short video"
      };
      toolbar.querySelectorAll("[data-md-command]").forEach((button) => {
        const command = button.getAttribute("data-md-command");
        if (!allowedTools[command]) {
          button.remove();
          return;
        }
        button.title = allowedTools[command];
        button.setAttribute("aria-label", allowedTools[command]);
        [...button.childNodes].forEach((child) => {
          if (child.nodeType === Node.TEXT_NODE) child.remove();
        });
      });
      if (toolsSlot && toolbar.parentElement !== toolsSlot) toolsSlot.append(toolbar);
      const hint = document.querySelector(".markdown-hint");
      if (hint) hint.textContent = "";
    }

    function renderRail() {
      const hotItems = [
        ["f005", "视频提示词更像分镜", "热度 312"],
        ["f003", "RAG 召回链路三段检查", "热度 247"],
        ["f001", "Cursor 多文件改动怎么拆", "热度 213"],
        ["f002", "429 排错先看限流窗口", "热度 158"],
        ["f006", "MCP 权限边界怎么写", "热度 126"]
      ];
      document.getElementById("hot-list").innerHTML = hotItems.map(([id, title, score], index) => `
        <button type="button" class="rank-row" data-hot-item data-hot-target="${id}">
          <span class="rank">${index + 1}</span>
          <span class="row-title">${title}</span>
          <span class="row-meta">${score}</span>
        </button>
      `).join("");

      const topics = [
        ["Vibe Coding", "2.1k"],
        ["Agent", "1.8k"],
        ["RAG 应用", "1.6k"],
        ["ComfyUI", "1.3k"],
        ["API 排错", "982"],
        ["MCP Server", "876"]
      ];
      document.getElementById("topic-list").innerHTML = topics.map(([title, count]) => `
        <a class="topic-pill" data-topic-rail data-href="../c-end-topic-aggregate-v1/index.html?topic=${encodeURIComponent(title)}" href="../c-end-topic-aggregate-v1/index.html?topic=${encodeURIComponent(title)}">
          <span class="topic-name"># ${title}</span>
          <span class="topic-count">${count}</span>
        </a>
      `).join("");
    }

    const markdownSnippets = {
      heading: "\n## 小标题\n",
      bold: "**重点内容**",
      italic: "*补充说明*",
      quote: "\n> 关键判断\n",
      list: "\n- 要点一\n- 要点二\n",
      "ordered-list": "\n1. 第一步\n2. 第二步\n",
      image: "\n![图片说明](image-url)\n",
      video: "\n[短视频 50M 内](video-file)\n"
    };

    function updateComposeCounter() {
      const textarea = document.querySelector("[data-compose-markdown]");
      const counter = document.querySelector("[data-compose-counter]");
      if (!textarea || !counter) return;
      counter.textContent = `${textarea.value.length} / ${textarea.maxLength || 600}`;
    }

    function insertMarkdownSnippet(command) {
      const textarea = document.querySelector("[data-compose-markdown]");
      const snippet = markdownSnippets[command];
      if (!textarea || !snippet) return;
      let start = textarea.selectionStart ?? textarea.value.length;
      let end = textarea.selectionEnd ?? textarea.value.length;
      if (document.activeElement !== textarea && start === 0 && end === 0 && textarea.value.length) {
        start = textarea.value.length;
        end = textarea.value.length;
      }
      const nextValue = `${textarea.value.slice(0, start)}${snippet}${textarea.value.slice(end)}`;
      textarea.value = nextValue.slice(0, textarea.maxLength || 600);
      const nextPosition = Math.min(start + snippet.length, textarea.value.length);
      textarea.focus();
      textarea.setSelectionRange(nextPosition, nextPosition);
      updateComposeCounter();
    }

    function setSelectedTopic(topic) {
      const chip = document.querySelector("[data-compose-selected-topic]");
      if (!chip) return;
      chip.hidden = false;
      chip.textContent = `# ${topic}`;
    }

    document.addEventListener("click", (event) => {
      const hotItem = event.target.closest("[data-hot-item]");
      if (hotItem) {
        event.preventDefault();
        event.stopPropagation();
        location.href = hotUrl(hotItem.getAttribute("data-hot-target") || "");
        return;
      }

      if (event.target.closest("[data-hot-more]")) {
        event.preventDefault();
        event.stopPropagation();
        location.href = hotUrl();
        return;
      }

      const participationTopic = event.target.closest("[data-participation-topic]");
      if (participationTopic) {
        event.preventDefault();
        event.stopPropagation();
        location.href = composeTopicUrl(participationTopic.getAttribute("data-topic") || "");
        return;
      }

      if (event.target.closest("[data-participation-more]")) {
        event.preventDefault();
        event.stopPropagation();
        location.href = topicSquareUrl();
        return;
      }

      if (event.target.closest("[data-compose-topic-picker]")) {
        event.preventDefault();
        event.stopPropagation();
        document.querySelector("[data-topic-picker-panel]")?.classList.toggle("is-open");
        return;
      }

      const topicOption = event.target.closest("[data-topic-option]");
      if (topicOption) {
        event.preventDefault();
        event.stopPropagation();
        setSelectedTopic(topicOption.getAttribute("data-topic") || topicOption.textContent.replace(/^#\s*/, ""));
        document.querySelector("[data-topic-picker-panel]")?.classList.remove("is-open");
        return;
      }

      const markdownButton = event.target.closest("[data-md-command]");
      if (markdownButton) {
        event.preventDefault();
        event.stopPropagation();
        insertMarkdownSnippet(markdownButton.getAttribute("data-md-command"));
        return;
      }

      if (event.target.closest("[data-compose-image-upload]")) {
        event.preventDefault();
        event.stopPropagation();
        insertMarkdownSnippet("image");
        return;
      }

      if (event.target.closest("[data-compose-video-upload]")) {
        event.preventDefault();
        event.stopPropagation();
        insertMarkdownSnippet("video");
        return;
      }

      if (event.target.closest("[data-comment-action]")) {
        event.preventDefault();
        event.stopPropagation();
        const url = new URL(location.href);
        url.searchParams.set("state", "comments");
        location.href = url.href;
      }

      if (event.target.closest("[data-view-all-comments]")) {
        event.preventDefault();
        event.stopPropagation();
        location.href = modalUrl("comments-all");
      }

      if (event.target.closest("[data-flash-compose-action]")) {
        event.preventDefault();
        event.stopPropagation();
        location.href = modalUrl("compose");
      }

      if (event.target.closest("[data-close-modal]")) {
        event.preventDefault();
        event.stopPropagation();
        location.href = state === "comments-all" ? modalUrl("comments") : modalUrl(null);
      }
    });

    document.addEventListener("input", (event) => {
      if (event.target.closest("[data-compose-markdown]")) updateComposeCounter();
    });

    renderComposer();
    renderState();
    renderModals();
    renderRail();
    updateComposeCounter();
  </script>
