<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>多元拾光 C端用户主页与关系原型 V1</title>
  <link rel="icon" type="image/svg+xml" href="../_assets/brand/duoyuan-shiguang-favicon.svg" />
  <style>
    :root {
      --bg: #f6f8fb;
      --panel: #ffffff;
      --panel-soft: #f9fbff;
      --line: #e6edf5;
      --line-strong: #d9e2ee;
      --text: #151b26;
      --muted: #667085;
      --weak: #98a2b3;
      --brand: #16b8a6;
      --brand-deep: #0f9384;
      --brand-soft: rgba(22, 184, 166, 0.10);
      --blue: #2563eb;
      --blue-soft: rgba(37, 99, 235, 0.10);
      --orange: #f97316;
      --orange-soft: rgba(249, 115, 22, 0.12);
      --red: #ef4444;
      --red-soft: rgba(239, 68, 68, 0.10);
      --shadow: 0 18px 48px rgba(22, 32, 54, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 1920px;
      min-height: 1080px;
      margin: 0;
      overflow-x: hidden;
      overflow-y: auto;
      background:
        radial-gradient(circle at 18% 0%, rgba(22, 184, 166, 0.08), transparent 28%),
        radial-gradient(circle at 82% 10%, rgba(37, 99, 235, 0.06), transparent 30%),
        linear-gradient(90deg, rgba(37, 99, 235, 0.020) 1px, transparent 1px) 0 0 / 32px 32px,
        linear-gradient(0deg, rgba(22, 184, 166, 0.018) 1px, transparent 1px) 0 0 / 32px 32px,
        var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: default;
    }

    .page {
      width: 1920px;
      min-height: 1080px;
      position: relative;
    }

    .topbar {
      height: 72px;
      background: rgba(255, 255, 255, 0.88);
      border-bottom: 1px solid rgba(219, 227, 239, 0.86);
      backdrop-filter: blur(16px);
    }

    .nav-shell {
      width: 1440px;
      height: 72px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 220px 438px 430px 280px;
      gap: 24px;
      align-items: center;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      position: relative;
      background: linear-gradient(135deg, #16b8a6 0%, #2563eb 100%);
      box-shadow: 0 10px 24px rgba(22, 184, 166, 0.18);
    }

    .brand-mark::before,
    .brand-mark::after {
      content: "";
      position: absolute;
      background: #fff;
      border-radius: 2px;
      transform-origin: center;
    }

    .brand-mark::before {
      width: 19px;
      height: 5px;
      left: 9px;
      top: 17px;
      transform: rotate(-58deg);
    }

    .brand-mark::after {
      width: 20px;
      height: 5px;
      left: 15px;
      top: 17px;
      transform: rotate(58deg);
    }

    .brand-name {
      display: block;
      font-size: 25px;
      line-height: 30px;
      font-weight: 800;
      color: #121826;
    }

    .brand-sub {
      display: block;
      margin-top: 1px;
      font-size: 12px;
      line-height: 16px;
      color: var(--weak);
      white-space: nowrap;
    }

    .primary-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: flex-start;
    }

    .nav-item {
      height: 72px;
      padding: 0 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      position: relative;
      font-size: 15px;
      line-height: 20px;
      font-weight: 650;
      color: #344054;
      white-space: nowrap;
    }

    .nav-item.active {
      color: #0f766e;
    }

    .nav-item.active::after {
      content: "";
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 0;
      height: 3px;
      border-radius: 3px 3px 0 0;
      background: linear-gradient(90deg, #16b8a6, #2563eb);
    }

    .top-search {
      width: 430px;
      height: 42px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      color: #46566c;
      font-size: 14px;
      line-height: 20px;
      font-weight: 560;
      box-shadow: 0 8px 24px rgba(22, 32, 54, 0.04);
    }

    .top-search img,
    .icon-img,
    [data-icon] {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .top-search input {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font-size: 14px;
      line-height: 20px;
    }

    .top-search input::placeholder {
      color: var(--weak);
    }

    .top-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 14px;
    }

    .creator-btn {
      height: 40px;
      min-width: 116px;
      padding: 0 16px;
      border-radius: 8px;
      background: #101828;
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 650;
      box-shadow: 0 12px 26px rgba(16, 24, 40, 0.18);
    }

    .creator-btn img {
      width: 16px;
      height: 16px;
      filter: invert(1);
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      border: 1px solid #e7ecf3;
      border-radius: 20px;
      background: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .icon-btn img {
      width: 18px;
      height: 18px;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border: 2px solid #fff;
      border-radius: 999px;
      object-fit: cover;
      box-shadow: 0 8px 18px rgba(16, 24, 40, 0.10);
    }

    .profile-shell {
      width: 1380px;
      margin: 28px auto 88px;
    }

    .profile-card {
      width: 1380px;
      min-height: 177px;
      border: 1px solid rgba(22, 184, 166, 0.18);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: 132px minmax(0, 1fr) 352px;
      gap: 24px;
      padding: 28px 32px;
      position: relative;
      overflow: hidden;
    }

    .profile-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg, rgba(22, 184, 166, 0.10), transparent 36%, rgba(37, 99, 235, 0.06));
      pointer-events: none;
    }

    .profile-avatar-wrap,
    .profile-main,
    .profile-side {
      position: relative;
      z-index: 1;
    }

    .profile-avatar-large {
      width: 120px;
      height: 120px;
      border-radius: 999px;
      object-fit: cover;
      border: 4px solid #fff;
      box-shadow: 0 16px 32px rgba(22, 32, 54, 0.14);
    }

    .profile-name-row {
      min-height: 34px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .profile-name {
      font-size: 26px;
      line-height: 34px;
      font-weight: 780;
      color: #101828;
      letter-spacing: 0;
    }

    .badge {
      height: 24px;
      padding: 0 9px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--brand-soft);
      color: var(--brand-deep);
      font-size: 12px;
      line-height: 18px;
      font-weight: 700;
      border: 1px solid rgba(22, 184, 166, 0.20);
      white-space: nowrap;
    }

    .profile-id {
      margin-top: 4px;
      color: var(--weak);
      font-size: 13px;
      line-height: 18px;
    }

    .profile-bio {
      margin: 12px 0 0;
      max-width: 682px;
      min-height: 40px;
      color: #344054;
      font-size: 14px;
      line-height: 20px;
    }

    .profile-meta {
      margin-top: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .pill {
      height: 26px;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      line-height: 18px;
      font-weight: 650;
    }

    .pill img {
      width: 14px;
      height: 14px;
      opacity: 0.72;
    }

    .profile-side {
      align-self: stretch;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 18px;
    }

    .stat-row {
      height: 72px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      align-items: center;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.62);
      border: 1px solid rgba(230, 237, 245, 0.90);
    }

    .stat {
      min-width: 0;
      text-align: center;
      position: relative;
    }

    .stat + .stat::before {
      content: "";
      position: absolute;
      left: 0;
      top: 14px;
      bottom: 14px;
      width: 1px;
      background: rgba(22, 184, 166, 0.20);
    }

    .stat strong {
      display: block;
      color: #101828;
      font-size: 24px;
      line-height: 30px;
      font-weight: 780;
      font-family: "Montserrat", Arial, sans-serif;
    }

    .stat span {
      display: block;
      margin-top: 2px;
      color: var(--weak);
      font-size: 12px;
      line-height: 16px;
      font-weight: 650;
    }

    .action-row {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      height: 40px;
      border-radius: 999px;
      padding: 0 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 14px;
      line-height: 20px;
      font-weight: 700;
      white-space: nowrap;
    }

    .btn img {
      width: 17px;
      height: 17px;
      flex: 0 0 auto;
    }

    .btn-primary {
      background: #101828;
      color: #fff;
      box-shadow: 0 12px 26px rgba(16, 24, 40, 0.16);
    }

    .btn-primary img {
      filter: invert(1);
    }

    .btn-soft {
      background: var(--brand-soft);
      color: var(--brand-deep);
      border: 1px solid rgba(22, 184, 166, 0.22);
    }

    .btn-plain {
      background: rgba(255, 255, 255, 0.76);
      color: #344054;
      border: 1px solid var(--line);
    }

    .btn-danger {
      background: var(--red-soft);
      color: #b42318;
      border: 1px solid rgba(239, 68, 68, 0.18);
    }

    .quick-panel {
      margin-top: 22px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    .quick-card {
      min-height: 92px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.86);
      padding: 16px;
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr) 18px;
      gap: 12px;
      align-items: center;
      box-shadow: 0 10px 28px rgba(22, 32, 54, 0.04);
    }

    .quick-icon {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--brand-soft);
      border: 1px solid rgba(22, 184, 166, 0.18);
    }

    .quick-icon img {
      width: 20px;
      height: 20px;
    }

    .quick-card strong {
      display: block;
      color: #101828;
      font-size: 15px;
      line-height: 22px;
      font-weight: 750;
    }

    .quick-card span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      line-height: 18px;
    }

    .quick-arrow {
      width: 18px;
      height: 18px;
      opacity: 0.46;
    }

    .section-head {
      margin-top: 26px;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .section-title {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .section-title h2 {
      margin: 0;
      color: #101828;
      font-size: 20px;
      line-height: 28px;
      font-weight: 780;
    }

    .section-title span {
      color: var(--weak);
      font-size: 13px;
      line-height: 18px;
    }

    .profile-tabs {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .profile-tab {
      height: 36px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--muted);
      font-size: 14px;
      line-height: 20px;
      font-weight: 700;
    }

    .profile-tab.active {
      color: var(--brand-deep);
      background: var(--brand-soft);
      border-color: rgba(22, 184, 166, 0.18);
    }

    .content-grid {
      width: 1380px;
      display: grid;
      grid-template-columns: repeat(5, 260px);
      gap: 20px;
      align-items: start;
    }

    .content-card {
      min-height: 302px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background: #fff;
      overflow: hidden;
      box-shadow: 0 12px 32px rgba(22, 32, 54, 0.06);
    }

    .cover {
      width: 260px;
      height: 160px;
      display: block;
      object-fit: cover;
      background: #eef3f8;
    }

    .card-body {
      padding: 13px 14px 14px;
    }

    .card-type {
      height: 22px;
      display: inline-flex;
      align-items: center;
      padding: 0 8px;
      border-radius: 999px;
      background: var(--blue-soft);
      color: #1d4ed8;
      font-size: 12px;
      line-height: 18px;
      font-weight: 700;
    }

    .card-title {
      margin: 9px 0 0;
      color: #101828;
      font-size: 15px;
      line-height: 21px;
      font-weight: 750;
      min-height: 42px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-meta,
    .card-stats {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--weak);
      font-size: 12px;
      line-height: 18px;
      font-weight: 620;
      min-width: 0;
    }

    .card-meta img,
    .card-stats img {
      width: 14px;
      height: 14px;
      opacity: 0.62;
    }

    .card-stats {
      justify-content: space-between;
      color: var(--muted);
    }

    .state-panel,
    .relation-panel {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: var(--shadow);
    }

    .state-panel {
      min-height: 260px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px;
    }

    .state-panel img {
      width: 52px;
      height: 52px;
      opacity: 0.72;
      margin-bottom: 16px;
    }

    .state-panel h3 {
      margin: 0;
      color: #101828;
      font-size: 20px;
      line-height: 28px;
    }

    .state-panel p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 22px;
    }

    .relation-panel {
      padding: 8px 0;
    }

    .relation-row {
      min-height: 88px;
      display: grid;
      grid-template-columns: 56px minmax(0, 1fr) 120px;
      gap: 14px;
      align-items: center;
      padding: 14px 18px;
      border-bottom: 1px solid rgba(230, 237, 245, 0.86);
    }

    .relation-row:last-child {
      border-bottom: 0;
    }

    .relation-avatar {
      width: 52px;
      height: 52px;
      border-radius: 999px;
      object-fit: cover;
      border: 2px solid #fff;
      box-shadow: 0 8px 18px rgba(16, 24, 40, 0.08);
    }

    .relation-name {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .relation-name strong {
      color: #101828;
      font-size: 15px;
      line-height: 22px;
      font-weight: 750;
    }

    .relation-desc {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      line-height: 19px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .relation-action {
      justify-self: end;
      height: 34px;
      min-width: 88px;
      border-radius: 999px;
      padding: 0 13px;
      background: rgba(255, 255, 255, 0.74);
      border: 1px solid var(--line);
      color: #344054;
      font-size: 13px;
      line-height: 18px;
      font-weight: 700;
    }

    .relation-action.followed {
      background: var(--brand-soft);
      border-color: rgba(22, 184, 166, 0.20);
      color: var(--brand-deep);
    }

    .modal-layer {
      position: fixed;
      inset: 0;
      z-index: 1500;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(15, 23, 42, 0.30);
      backdrop-filter: blur(8px);
    }

    .profile-modal {
      width: 760px;
      max-height: 820px;
      border-radius: 18px;
      border: 1px solid rgba(230, 237, 245, 0.94);
      background: rgba(255, 255, 255, 0.98);
      box-shadow: 0 28px 80px rgba(15, 23, 42, 0.26);
      overflow: hidden;
    }

    .modal-head {
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      border-bottom: 1px solid var(--line);
    }

    .modal-head h2 {
      margin: 0;
      color: #101828;
      font-size: 19px;
      line-height: 26px;
      font-weight: 780;
    }

    .modal-close {
      width: 36px;
      height: 36px;
      border-radius: 999px;
      background: #f4f7fb;
      color: var(--muted);
      font-size: 22px;
      line-height: 36px;
    }

    .modal-body {
      padding: 24px;
    }

    .edit-grid {
      display: grid;
      grid-template-columns: 128px minmax(0, 1fr);
      gap: 22px;
      align-items: start;
    }

    .edit-avatar {
      width: 108px;
      height: 108px;
      border-radius: 999px;
      object-fit: cover;
      border: 4px solid #fff;
      box-shadow: 0 12px 28px rgba(16, 24, 40, 0.14);
    }

    .avatar-action {
      margin-top: 12px;
      height: 34px;
      border-radius: 999px;
      padding: 0 12px;
      background: var(--brand-soft);
      color: var(--brand-deep);
      border: 1px solid rgba(22, 184, 166, 0.20);
      font-size: 13px;
      line-height: 18px;
      font-weight: 700;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      margin-bottom: 8px;
      color: #344054;
      font-size: 13px;
      line-height: 18px;
      font-weight: 720;
    }

    .field input,
    .field textarea {
      width: 100%;
      border: 1px solid var(--line-strong);
      border-radius: 10px;
      background: #fff;
      color: var(--text);
      outline: 0;
      font-size: 14px;
      line-height: 20px;
    }

    .field input {
      height: 42px;
      padding: 0 12px;
    }

    .field textarea {
      min-height: 86px;
      resize: none;
      padding: 10px 12px;
    }

    .binding-list {
      margin-top: 18px;
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
    }

    .binding-row {
      min-height: 66px;
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr) 124px;
      gap: 12px;
      align-items: center;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(249, 251, 255, 0.74);
    }

    .binding-row:last-child {
      border-bottom: 0;
    }

    .binding-icon {
      width: 38px;
      height: 38px;
      border-radius: 13px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      border: 1px solid var(--line);
    }

    .binding-icon img {
      width: 20px;
      height: 20px;
    }

    .binding-title {
      color: #101828;
      font-size: 14px;
      line-height: 20px;
      font-weight: 750;
    }

    .binding-desc {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      line-height: 18px;
    }

    .binding-action {
      justify-self: end;
      height: 34px;
      border-radius: 999px;
      padding: 0 13px;
      border: 1px solid rgba(22, 184, 166, 0.20);
      background: var(--brand-soft);
      color: var(--brand-deep);
      font-size: 13px;
      line-height: 18px;
      font-weight: 700;
    }

    .bind-panel {
      display: grid;
      grid-template-columns: 1fr 228px;
      gap: 22px;
      align-items: stretch;
    }

    .bind-form {
      padding: 20px;

    function metaMarkup(items) {

    function profileActions(state) {
      if (isMyProfile(state)) {

          <img src="${icon("User & Faces/user-follow-line.svg")}" alt="" data-icon />
          关注作者
        </button>
        <button class="btn btn-plain" type="button" data-state-link="fans">粉丝列表</button>
      `;
    }

    function profileHeader(profile, state) {
      const tip = state === "incomplete"
        ? `<span class="badge">资料待完善</span>`
        : `<span class="badge">${profile.badge}</span>`;

      return `

            <div class="action-row" data-profile-actions>${profileActions(state)}</div>
          </div>

    }

    function quickPanel(state) {
      if (!isMyProfile(state)) return "";
      return `
        <section class="quick-panel" data-profile-quick-panel>

      const state = currentState();
      const profile = isMyProfile(state) ? profileBase : otherProfile;
      const root = document.querySelector("#profile-root");
      const modal = document.querySelector("#profile-modal-root");
      root.innerHTML = `
        ${profileHeader(profile, state)}
        ${quickPanel(state)}
        ${sectionHead(state)}
        ${mainBody(state)}
      `;
      modal.innerHTML = state === "edit" ? editModal() : state === "phone" ? phoneModal() : state === "wechat" ? wechatModal() : "";
      bindStateLinks();
    }

    function bindStateLinks() {
      document.querySelectorAll("[data-state-link]").forEach((node) => {
        node.addEventListener("click", (event) => {
          event.preventDefault();
          goState(node.getAttribute("data-state-link"));
        });
      });

      document.querySelectorAll("[data-workspace-entry]").forEach((node) => {
        node.addEventListener("click", (event) => {
          event.preventDefault();
          const target = new URL("../c-end-creation-platform-v2/index.html?state=management", window.location.href);
          window.location.href = target.toString();
        });
      });

      document.querySelectorAll("[data-favorites-entry]").forEach((node) => {
        node.addEventListener("click", (event) => {
          event.preventDefault();
          const target = new URL("../c-end-favorites-v1/index.html", window.location.href);
          window.location.href = target.toString();
        });
      });
    }

    render();
  </script>
  <script src="../_shared/c-end-prototype-interactions.js?v=20260617-model-service-content-v1"></script>
</body>
</html>
