<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>多元拾光 C端话题聚合页多状态原型 V1</title>
  <link rel="icon" type="image/svg+xml" href="../_assets/brand/duoyuan-shiguang-favicon.svg" />
  <style>
    :root {
      --bg: #ffffff;
      --panel: #ffffff;
      --panel-soft: #fafafa;
      --line: #f1f1f1;
      --line-strong: #e2e2e2;
      --text: #242424;
      --muted: #4f4f4f;
      --weak: #8a8a8a;
      --brand: #242424;
      --brand-deep: #242424;
      --brand-soft: rgba(36, 36, 36, 0.06);
      --blue: #4f4f4f;
      --blue-soft: rgba(36, 36, 36, 0.06);
      --purple: #4f4f4f;
      --purple-soft: rgba(36, 36, 36, 0.06);
      --orange: #4f4f4f;
      --orange-soft: rgba(36, 36, 36, 0.06);
      --green: #4f4f4f;
      --green-soft: rgba(36, 36, 36, 0.06);
      --red: #4f4f4f;
      --red-soft: rgba(36, 36, 36, 0.06);
      --shadow: none;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 1920px;
      min-height: 1080px;
      margin: 0;
      overflow-x: hidden;
      overflow-y: auto;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      letter-spacing: 0;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: default;
    }

    .page {
      width: 1920px;
      min-height: 1080px;
      position: relative;
    }

    .topbar {
      height: 72px;
      background: rgba(255, 255, 255, 0.92);
      border-bottom: 1px solid rgba(219, 227, 239, 0.92);
      backdrop-filter: blur(16px);
    }

    .nav-shell {
      width: 1440px;
      height: 72px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 30px;
    }

    .brand {
      width: 184px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .brand-mark {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, #2563eb, #16b8a6);
      position: relative;
      box-shadow: 0 10px 22px rgba(22, 184, 166, 0.20);
    }

    .brand-mark::after {
      content: "";
      position: absolute;
      left: 8px;
      top: 8px;
      width: 16px;
      height: 16px;
      border: 3px solid rgba(255, 255, 255, 0.94);
      border-left: 0;
      border-bottom: 0;
      transform: rotate(45deg);
      border-radius: 2px;
    }

    .brand-name {
      font-size: 28px;
      line-height: 34px;
      font-weight: 820;
      color: #111827;
    }

    .brand-sub {
      margin-left: 2px;
      color: var(--muted);
      font-size: 13px;
      line-height: 18px;
      font-weight: 650;
      white-space: nowrap;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 26px;
      height: 72px;
      flex-shrink: 0;
    }

    .nav-item {
      height: 72px;
      display: flex;
      align-items: center;
      color: #273244;
      font-size: 16px;
      line-height: 22px;
      font-weight: 740;
      position: relative;
      white-space: nowrap;
    }

    .nav-item.active {
      color: var(--brand-deep);
    }

    .nav-item.active::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 3px;
      border-radius: 3px 3px 0 0;
      background: var(--brand);
    }

    .top-search {
      margin-left: auto;
      width: 460px;
      height: 40px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      color: #46566c;
      font-size: 14px;
      line-height: 20px;
      font-weight: 560;
      box-shadow: 0 10px 28px rgba(22, 32, 54, 0.04);
    }

    .top-search .search-value {
      color: #182233;
      font-weight: 650;
    }

    .creator-button {
      height: 40px;
      padding: 0 18px;
      border: 1px solid #d9d9d9;
      border-radius: 8px;
      background: #ffffff;
      color: #242424;
      font-size: 14px;
      line-height: 20px;
      font-weight: 760;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      border: 1px solid var(--line);
    }

    .icon-img {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      opacity: 0.74;
    }

    .topic-layout {
      width: 1240px;
      min-height: 964px;
      margin: 24px auto 0;
      display: grid;
      grid-template-columns: 820px 340px;
      gap: 24px;
      align-items: start;
    }

    .main-panel,
    .rail-card {
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: var(--shadow);
    }

    .main-panel {
      min-height: 888px;
      overflow: hidden;
    }

    .topic-header {
      padding: 24px 24px 22px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #fafafa, #ffffff);
      position: relative;
    }

    .topic-topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .topic-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #6b6b6b;
      font-size: 13px;
      line-height: 18px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .topic-kicker img {
      width: 16px;
      height: 16px;
      opacity: 0.76;
      flex-shrink: 0;
    }

    .topic-title {
      margin: 0;
      font-size: 34px;
      line-height: 42px;
      font-weight: 860;
      color: #111827;
      letter-spacing: 0;
    }

    .topic-desc {
      width: 620px;
      margin: 10px 0 0;
      color: #526174;
      font-size: 15px;
      line-height: 24px;
      font-weight: 560;
    }

    .follow-button {
      height: 42px;
      padding: 0 20px;
      border-radius: 10px;
      background: var(--brand);
      color: #fff;
      font-size: 14px;
      line-height: 20px;
      font-weight: 820;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: none;
      flex-shrink: 0;
    }

    .follow-button.followed {
      background: #fff;
      color: var(--brand-deep);
      border: 1px solid #d9d9d9;
      box-shadow: none;
    }

    .topic-meta-row {
      margin-top: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .topic-chip {
      height: 28px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 10px;
      border-radius: 999px;
      background: #ffffff;
      border: 1px solid #e2e2e2;
      color: #4f4f4f;
      font-size: 13px;
      line-height: 18px;
      font-weight: 700;
    }

    .topic-chip.primary {
      background: #fafafa;
      color: #242424;
      border-color: var(--line);
    }

    .tabs-bar {
      height: 64px;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .tabs {
      display: flex;
      align-items: center;
      gap: 26px;
      height: 64px;
    }

    .tab {
      height: 64px;
      display: flex;
      align-items: center;
      color: #5a697d;
      font-size: 16px;
      line-height: 22px;
      font-weight: 760;
      position: relative;
    }

    .tab.active {
      color: var(--brand-deep);
    }

    .tab.active::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 3px;
      border-radius: 3px 3px 0 0;
      background: var(--brand);
    }

    .list-note {
      color: #7a8798;
      font-size: 13px;
      line-height: 18px;
      font-weight: 650;
    }

    .content-list {
      background: #fff;
    }

    .content-card {
      min-height: 134px;
      position: relative;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      background: #fff;
    }

    .content-card::before {
      content: "";
      position: absolute;
      left: 0;
      top: 18px;
      bottom: 18px;
      width: 3px;
      border-radius: 0 3px 3px 0;
      background: linear-gradient(180deg, #16b8a6, #22c55e);
      opacity: 0;
      transition: opacity 0.16s ease;
      pointer-events: none;
    }

    .content-card.featured {
      background: #fff;
    }

    .content-card.flash-card {
      min-height: 118px;
    }

    .content-card:hover::before {
      opacity: 1;
    }

    .type-icon {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border: 1px solid var(--line);
    }

    .type-icon img {
      width: 20px;
      height: 20px;
      opacity: 0.82;
    }

    .type-icon.article,
    .type-icon.guide {
      background: var(--blue-soft);
    }

    .type-icon.flash {
      background: var(--brand-soft);
    }

    .type-icon.aigc,
    .type-icon.mcp {
      background: var(--purple-soft);
    }

    .type-icon.model {
      background: var(--green-soft);
    }

    .type-icon.workflow,
    .type-icon.skill {
      background: var(--orange-soft);
    }

    .card-main {
      min-width: 0;
    }

    .item-main {
      min-width: 0;
    }

    .item-title-row,
    .card-labels {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .type-badge,
    .label {
      height: 22px;
      padding: 0 9px 0 12px;
      display: inline-flex;
      align-items: center;
      position: relative;
      overflow: hidden;
      border-radius: 0;
      font-size: 12px;
      line-height: 18px;
      font-weight: 700;
      flex: 0 0 auto;
      border: 0;
      background: linear-gradient(90deg, rgba(36, 36, 36, 0.12) 0%, rgba(36, 36, 36, 0.055) 58%, rgba(36, 36, 36, 0) 100%);
      color: #3f3f3f;
    }

    .type-badge::before,
    .label::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: #242424;
    }

    .type-article {
      color: #3f3f3f;
      background: linear-gradient(90deg, rgba(36, 36, 36, 0.12) 0%, rgba(36, 36, 36, 0.055) 58%, rgba(36, 36, 36, 0) 100%);
    }

    .type-workflow,
    .type-model {
      color: #3f3f3f;
      background: linear-gradient(90deg, rgba(36, 36, 36, 0.12) 0%, rgba(36, 36, 36, 0.055) 58%, rgba(36, 36, 36, 0) 100%);
    }

    .type-skill {
      color: #3f3f3f;
      background: linear-gradient(90deg, rgba(36, 36, 36, 0.12) 0%, rgba(36, 36, 36, 0.055) 58%, rgba(36, 36, 36, 0) 100%);
    }

    .type-mcp,
    .type-aigc {
      color: #3f3f3f;
      background: linear-gradient(90deg, rgba(36, 36, 36, 0.12) 0%, rgba(36, 36, 36, 0.055) 58%, rgba(36, 36, 36, 0) 100%);
    }

    .type-flash {
      color: #3f3f3f;
      background: linear-gradient(90deg, rgba(36, 36, 36, 0.12) 0%, rgba(36, 36, 36, 0.055) 58%, rgba(36, 36, 36, 0) 100%);
    }

    .type-guide {
      color: #3f3f3f;
      background: linear-gradient(90deg, rgba(36, 36, 36, 0.12) 0%, rgba(36, 36, 36, 0.055) 58%, rgba(36, 36, 36, 0) 100%);
    }

    .type-pick {
      color: #394457;
      background: rgba(17, 24, 39, 0.06);
    }

    .label.flash {
      background: var(--brand-soft);
      color: var(--brand-deep);
    }

    .label.model,
    .label.skill {
      background: var(--green-soft);
      color: #16803a;
    }

    .label.aigc,
    .label.mcp {
      background: var(--purple-soft);
      color: var(--purple);
    }

    .label.workflow,
    .label.guide {
      background: var(--orange-soft);
      color: var(--orange);
    }

    .label.pick {
      background: rgba(17, 24, 39, 0.06);
      color: #394457;
    }

    .card-title {
      margin: 0;
      min-width: 0;
      color: #111827;
      font-size: 17px;
      line-height: 25px;
      font-weight: 760;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .card-desc {
      margin: 8px 0 0;
      max-width: 610px;
      color: #667085;
      font-size: 14px;
      line-height: 22px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .card-desc.flash-text {
      max-width: 760px;
      color: #334155;
      font-size: 15px;
      line-height: 24px;
      white-space: normal;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .meta-line,
    .card-meta {
      margin-top: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      min-width: 0;
    }

    .topics {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 6px;
      color: #7b8798;
      font-size: 12px;
      line-height: 18px;
      white-space: nowrap;
      overflow: hidden;
    }

    .content-card .topic-chip,
    .topic-tag {
      height: 22px;
      padding: 0 8px;
      display: inline-flex;
      align-items: center;
      border-radius: 5px;
      background: #fafafa;
      color: #4f4f4f;
      font-weight: 600;
      flex: 0 0 auto;
    }

    .author-time {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stats {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #667085;
      font-size: 12px;
      line-height: 18px;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .stat-item {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .stat-item img {
      width: 15px;
      height: 15px;
      opacity: 0.72;
      flex-shrink: 0;
    }

    .dot {
      color: #b2bdca;
    }

    .card-side {
      width: 148px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
    }

    .cover {
      width: 144px;
      height: 88px;
      border-radius: 8px;
      object-fit: cover;
      border: 1px solid var(--line);
      background: #eef2f7;
    }

    .metrics {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      color: #667085;
      font-size: 13px;
      line-height: 18px;
      font-weight: 650;
      width: 100%;
    }

    .metric {
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }

    .metric img {
      width: 15px;
      height: 15px;
      opacity: 0.70;
    }

    .rail {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .rail-card {
      padding: 18px;
    }

    .rail-head {
      margin: 0 0 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .rail-more {
      color: var(--weak);
      font-size: 12px;
      line-height: 18px;
      font-weight: 680;
    }

    .rail-head .rail-title {
      margin: 0;
    }

    .rail-title {
      margin: 0 0 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #182233;
      font-size: 17px;
      line-height: 24px;
      font-weight: 820;
    }

    .rail-title small {
      color: var(--weak);
      font-size: 12px;
      line-height: 18px;
      font-weight: 680;
    }

    .related-list,
    .featured-list,
    .activity-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .related-item,
    .featured-item,
    .activity-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 36px;
      color: #3d4b60;
      font-size: 13px;
      line-height: 18px;
      font-weight: 700;
    }

    .rail-item-main {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .rail-item-main img {
      width: 16px;
      height: 16px;
      opacity: 0.70;
      flex-shrink: 0;
    }

    .rail-sub {
      color: var(--weak);
      font-size: 12px;
      line-height: 18px;
      font-weight: 650;
      white-space: nowrap;
    }

    .ad-card {
      padding: 0;
      overflow: hidden;
    }

    .ad-media {
      height: 118px;
      background:
        linear-gradient(135deg, rgba(36, 36, 36, 0.22), rgba(36, 36, 36, 0.04)),
        url("../_assets/figma/cover-08-wide.png") center / cover;
      position: relative;
    }

    .ad-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.90);
      color: #4f4f4f;
      font-size: 12px;
      line-height: 24px;
      font-weight: 820;
    }

    .ad-body {
      padding: 16px 18px 18px;
    }

    .ad-title {
      margin: 0;
      color: #172033;
      font-size: 16px;
      line-height: 22px;
      font-weight: 820;
    }

    .ad-desc {
      margin: 6px 0 0;
      color: #64748b;
      font-size: 13px;
      line-height: 20px;
      font-weight: 560;
    }

    .state-card {
      min-height: 560px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 64px 80px;
      background: linear-gradient(180deg, #fff, #fbfdff);
    }

    .state-icon {
      width: 58px;
      height: 58px;
      border-radius: 16px;
      background: var(--brand-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }

    .state-icon img {
      width: 26px;
      height: 26px;
      opacity: 0.76;
    }

    .state-title {
      margin: 0;
      color: #172033;
      font-size: 22px;
      line-height: 30px;
      font-weight: 820;
    }

    .state-desc {
      width: 420px;
      margin: 10px auto 0;
      color: #667085;
      font-size: 14px;
      line-height: 22px;
      font-weight: 540;
    }

    .state-actions {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .state-action {
      height: 36px;
      padding: 0 14px;
      border-radius: 8px;
      background: #ecfdf9;
      color: var(--brand-deep);
      border: 1px solid rgba(22, 184, 166, 0.28);
      font-size: 13px;
      line-height: 18px;
      font-weight: 780;
    }

    .skeleton-card {
      min-height: 134px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      display: block;
    }

    .skeleton-block {
      border-radius: 8px;
      background: linear-gradient(90deg, #eef3f9, #f8fbff, #eef3f9);
      background-size: 220% 100%;
      animation: shimmer 1.6s infinite linear;
    }

    .skeleton-icon {
      width: 42px;
      height: 42px;
      border-radius: 10px;
    }

    .skeleton-line {
      height: 16px;
      margin-bottom: 12px;
    }

    .skeleton-line.short {
      width: 64%;
    }

    .skeleton-line.long {
      width: 88%;
    }

    .skeleton-cover {
      display: none;
    }

    @keyframes shimmer {
      0% { background-position: 0% 0; }
      100% { background-position: -220% 0; }
    }

    .login-sheet {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 380px;
      transform: translate(-50%, -50%);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid var(--line);
      box-shadow: 0 28px 90px rgba(22, 32, 54, 0.24);
      padding: 24px;
      z-index: 4;
      text-align: center;
    }

    .login-sheet h2 {
      margin: 12px 0 8px;
      color: #182233;
      font-size: 22px;
      line-height: 30px;
      font-weight: 820;
    }

    .login-sheet p {
      margin: 0;
      color: #64748b;
      font-size: 14px;
      line-height: 22px;
      font-weight: 560;
    }

    .login-actions {

          <span class="topic-chip">${topic.heat}</span>
          ${topic.chips.map((chip) => `<span class="topic-chip">${chip}</span>`).join("")}
        </div>
