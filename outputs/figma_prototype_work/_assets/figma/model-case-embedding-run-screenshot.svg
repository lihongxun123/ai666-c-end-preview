  <text x="646" y="112" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="20" font-weight="800" fill="#1f1f1f">召回结果</text>
  <rect x="646" y="132" width="230" height="72" rx="8" fill="#fff" stroke="#e6e6e2"/>
  <text x="664" y="158" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" font-weight="700" fill="#1f1f1f">#1 rag_doc_b</text>
  <text x="786" y="158" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" fill="#16725f">0.4051</text>
  <text x="664" y="184" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" fill="#5f5f5f">新用户按任务理解模型</text>
  <rect x="646" y="220" width="230" height="72" rx="8" fill="#fff" stroke="#e6e6e2"/>
  <text x="664" y="246" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" font-weight="700" fill="#1f1f1f">#2 rag_doc_a</text>
  <text x="786" y="246" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" fill="#16725f">0.3355</text>
  <text x="664" y="272" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" fill="#5f5f5f">流程和成本提示提升收藏</text>
  <rect x="646" y="308" width="230" height="72" rx="8" fill="#fff" stroke="#e6e6e2"/>
  <text x="664" y="334" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" font-weight="700" fill="#1f1f1f">#3 rag_doc_c</text>
  <text x="786" y="334" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" fill="#16725f">0.2160</text>
