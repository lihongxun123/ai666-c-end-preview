  <rect x="56" y="420" width="820" height="54" rx="8" fill="#fff8e8" stroke="#eadfbe"/>
  <text x="76" y="446" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" font-weight="700" fill="#1f1f1f">人工复核</text>
  <text x="154" y="446" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" fill="#5f5f5f">召回命中不等于事实正确；发布前仍需检查资料是否过期、片段是否完整、价格口径是否最新。</text>
