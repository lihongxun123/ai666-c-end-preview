  <text x="72" y="157" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" font-weight="700" fill="#1f1f1f">用户问题</text>
  <text x="72" y="181" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" fill="#5f5f5f">案例素材优先选什么模型？</text>
  <rect x="56" y="212" width="258" height="174" rx="8" fill="#ffffff" stroke="#e6e6e2"/>
  <text x="72" y="238" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" font-weight="700" fill="#1f1f1f">脱敏片段</text>
  <text x="72" y="268" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" fill="#4d4d4d">rag_doc_b：新用户按任务问模型选择</text>
  <text x="72" y="298" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" fill="#4d4d4d">rag_doc_a：案例包含流程和成本提示</text>
  <text x="72" y="328" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" fill="#4d4d4d">rag_doc_c：复用提示词带来更多追问</text>
