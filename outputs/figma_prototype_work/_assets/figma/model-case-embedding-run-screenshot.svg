<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">text-embedding-3-large 脱敏运行过程截图</title>
  <desc id="desc">展示一次 Embedding 召回实测的脱敏输入、调用摘要和召回结果，不包含密钥、请求头、账户余额或原始日志。</desc>
  <rect width="960" height="540" rx="16" fill="#f5f5f3"/>
  <rect x="28" y="28" width="904" height="484" rx="12" fill="#ffffff" stroke="#deded9"/>
  <rect x="28" y="28" width="904" height="48" rx="12" fill="#242424"/>
  <circle cx="55" cy="52" r="6" fill="#ef6b5b"/>
  <circle cx="77" cy="52" r="6" fill="#f0c451"/>
  <circle cx="99" cy="52" r="6" fill="#65bd69"/>
  <text x="126" y="58" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700" fill="#ffffff">Embedding 召回实测 / 脱敏过程图</text>
  <text x="790" y="58" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="13" fill="#c9c9c9">2026-06-17 15:24</text>

  <text x="56" y="112" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="20" font-weight="800" fill="#1f1f1f">输入材料</text>
